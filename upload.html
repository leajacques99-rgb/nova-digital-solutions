    <style>
        :root {
            --primary: #2563EB;
            --primary-dark: #1E40AF;
            --secondary: #0F172A;
            --white: #FFFFFF;
            --gray-100: #F1F5F9;
            --gray-400: #94A3B8;
            --border: #E2E8F0;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
            color: var(--secondary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav-wrapper {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span { color: var(--secondary); }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .btn-cta {
            background: var(--primary);
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
        }

        .mobile-menu-btn { display: none; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
        }

        .upload-card {
            background: var(--white);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px -5px rgba(0,0,0,0.05);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--gray-400);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background: #FAFAFA;
        }

        .icon-cloud {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .file-list {
            margin-top: 25px;
            max-height: 250px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            margin-top: 25px;
            opacity: 0.5;
            pointer-events: none;
        }

        .btn-main.active {
            opacity: 1;
            pointer-events: all;
        }

        footer {
            padding: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--gray-400);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
